spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

jwt:
  secret: change_me_in_production_use_strong_random_key_256bit_minimum
  expiration: 86400000

app:
  file-upload:
    dir: ./target/uploads
