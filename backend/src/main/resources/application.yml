spring:
  application:
    name: smart-expense-tracker
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:change_me_in_production_use_strong_random_key_256bit_minimum}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-http-post-size: 1MB
    max-http-header-size: 8KB

logging:
  level:
    root: INFO
    com.smart.expense_tracker: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"