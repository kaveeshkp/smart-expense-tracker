spring:
  application:
    name: smart-expense-tracker
  datasource:
    url: jdbc:h2:mem:expense_tracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: always
  cache:
    type: simple
  task:
    scheduling:
      pool:
        size: 2
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:change_me_in_production_use_strong_random_key_256bit_minimum}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-http-post-size: 10MB
    max-http-header-size: 8KB

app:
  file-upload:
    dir: ${FILE_UPLOAD_DIR:./uploads}

logging:
  level:
    root: INFO
    com.smart.expense_tracker: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"